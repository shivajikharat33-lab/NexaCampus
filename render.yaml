services:
  - type: web
    name: nexacampus-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DB_NAME
        value: civic_detector